<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Music to Plex - Auth Redirect</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 500px;
            margin: 80px auto;
            padding: 20px;
            text-align: center;
            background: #101114;
            color: #fff;
            min-height: 100vh;
        }
        h2 {
            margin-bottom: 10px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #2a2d33;
            border-top-color: #ff0033;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #ff335f;
        }
        .error {
            color: #ff8e8e;
        }
        .success {
            color: #ff6687;
        }
        .code-block {
            background: #17191f;
            border: 1px solid #2a2d33;
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
            margin: 20px 0;
            text-align: left;
        }
        button {
            background: #ff0033;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        button:hover {
            background: #ff335f;
        }
        .subtle {
            color: #8b919d;
            font-size: 13px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div id="content">
        <h2>Redirecting...</h2>
        <div class="spinner"></div>
        <p>Sending you back to your YouTube Music to Plex instance.</p>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');
            const errorDescription = params.get('error_description');

            const content = document.getElementById('content');

            function showError(title, message) {
                content.innerHTML = `
                    <h2 class="error">${title}</h2>
                    <p>${message}</p>
                    <p class="subtle">Close this window and try again from your YouTube Music to Plex instance.</p>
                `;
            }

            function showManualCode(code) {
                content.innerHTML = `
                    <h2 class="success">Authentication Successful</h2>
                    <p>Automatic redirect failed. Copy this code back to your application:</p>
                    <div class="code-block">${code}</div>
                    <button onclick="copyCode()">Copy Code</button>
                    <p class="subtle">Paste this code in your YouTube Music to Plex instance to complete setup.</p>
                `;

                window.copyCode = function() {
                    navigator.clipboard.writeText('${code}');
                    document.querySelector('button').textContent = 'Copied';
                    setTimeout(() => {
                        document.querySelector('button').textContent = 'Copy Code';
                    }, 2000);
                };
            }

            function showLanding() {
                content.innerHTML = `
                    <h2>YouTube Music to Plex</h2>
                    <p>This page can relay a Google OAuth redirect back to your local instance.</p>
                    <p>Direct callbacks to your app are preferred when possible, but this page can still be used for hosted redirect flows.</p>
                `;
            }

            if (error) {
                const message = error === 'access_denied'
                    ? 'You denied access to your Google account.'
                    : (errorDescription || error);
                showError('Authorization Failed', message);
                return;
            }

            if (!code) {
                showLanding();
                return;
            }

            if (state) {
                try {
                    const stateData = JSON.parse(atob(state));
                    const returnUrl = stateData.return_url;

                    if (!returnUrl) {
                        throw new Error('No return URL');
                    }

                    const url = new URL(returnUrl);
                    url.searchParams.set('code', code);
                    url.searchParams.set('redirect_uri', window.location.origin + window.location.pathname);

                    if (stateData.csrf) {
                        url.searchParams.set('state', stateData.csrf);
                    }

                    window.location.href = url.toString();
                } catch (e) {
                    console.error('State parsing failed:', e);
                    showManualCode(code);
                }
            } else {
                showManualCode(code);
            }
        })();
    </script>
</body>
</html>
